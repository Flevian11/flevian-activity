name: Smart Activity Engine

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🎲 RANDOM DELAY (0–20 minutes)
      - name: Random delay
        run: |
          DELAY=$((RANDOM % 1200))
          echo "Sleeping for $DELAY seconds..."
          sleep $DELAY

      - name: Update auto.json
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          if [ ! -f auto.json ]; then
            echo "{\"updates\": []}" > auto.json
          fi

          sudo apt-get update -y
          sudo apt-get install -y jq

          jq --arg time "$TIMESTAMP" '.updates += [$time] | .last_update=$time' auto.json > tmp.json
          mv tmp.json auto.json

      # 💬 RANDOM COMMIT MESSAGE
      - name: Commit changes
        run: |
          git config user.name "Flevian11"
          git config user.email "flevianochoka19@gmail.com"

          git add auto.json

          messages=(
            "refactor: improve structure"
            "feat: update internal data"
            "chore: minor adjustments"
            "fix: small improvements"
            "docs: update records"
            "perf: optimize flow"
            "style: cleanup"
            "build: update data pipeline"
          )

          MSG=${messages[$RANDOM % ${#messages[@]}]}

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$MSG ($(date -u +'%H:%M'))"
            git push
          fi
