name: Auto Activity Engine

on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 6AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update auto.json
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          if [ ! -f auto.json ]; then
            echo "{\"updates\": []}" > auto.json
          fi

          sudo apt-get update
          sudo apt-get install -y jq

          jq --arg time "$TIMESTAMP" '.updates += [$time] | .last_update=$time' auto.json > tmp.json
          mv tmp.json auto.json

      - name: Commit changes
        run: |
          git config user.name "Flevian11"
          git config user.email "flevianochoka19@gmail.com"

          git add auto.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: daily activity update"
            git push
          fi