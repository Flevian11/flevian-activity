name: Smart Activity Engine

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🎲 RANDOM DELAY (0–30 min)
      - name: Random delay
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Sleeping for $DELAY seconds..."
          sleep $DELAY

      - name: Decide whether to commit
        id: decision
        run: |
          TODAY=$(date -u +"%Y-%m-%d")

          if [ ! -f auto.json ]; then
            echo "{\"updates\": []}" > auto.json
          fi

          sudo apt-get update -y
          sudo apt-get install -y jq

          COUNT=$(jq --arg today "$TODAY" '[.updates[] | select(startswith($today))] | length' auto.json)

          echo "Today's commits: $COUNT"

          # 🎯 MIN 6, MAX 15
          if [ "$COUNT" -ge 15 ]; then
            echo "should_commit=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Random chance (about 50%)
          CHANCE=$((RANDOM % 100))

          if [ "$COUNT" -lt 6 ]; then
            # Force commits until minimum reached
            echo "should_commit=true" >> $GITHUB_OUTPUT
          elif [ "$CHANCE" -lt 50 ]; then
            echo "should_commit=true" >> $GITHUB_OUTPUT
          else
            echo "should_commit=false" >> $GITHUB_OUTPUT
          fi

      - name: Update auto.json
        if: steps.decision.outputs.should_commit == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          jq --arg time "$TIMESTAMP" '.updates += [$time] | .last_update=$time' auto.json > tmp.json
          mv tmp.json auto.json

      - name: Commit changes
        if: steps.decision.outputs.should_commit == 'true'
        run: |
          git config user.name "Flevian11"
          git config user.email "flevianochoka19@gmail.com"

          git add auto.json

          messages=(
            "refactor: improve structure"
            "feat: update internal data"
            "chore: minor adjustments"
            "fix: small improvements"
            "docs: update records"
            "perf: optimize flow"
            "style: cleanup"
            "build: update data pipeline"
          )

          MSG=${messages[$RANDOM % ${#messages[@]}]}

          git commit -m "$MSG ($(date -u +'%H:%M'))"
          git push
